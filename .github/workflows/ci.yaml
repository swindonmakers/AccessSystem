name: CI - Test and Build

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  CONTAINER_REGISTRY: ghcr.io
  IMAGE_NAME: access-system

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v6

    - name: 🛠️ Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🏗️ Build test image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        target: test
        load: true
        tags: accesssystem-test:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: 🧪 Run tests
      run: |
        docker run --rm accesssystem-test:latest

  build-production:
    name: 🚀 Build Production Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write

    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v6

    - name: 🏷️ Generate Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.CONTAINER_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch,priority=610
          type=semver,pattern={{raw}}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,format=long
          type=raw,value=latest,enable={{is_default_branch}}
        annotations: |
          runnumber=${{ github.run_id }}
          sha=${{ github.sha }}
          ref=${{ github.ref }}
          org.opencontainers.image.description="Production Container for Swindon Makerspace Access System"

    - name: 🔐 Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.CONTAINER_REGISTRY }}
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 🛠️ Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🚀 Build and push production image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        target: production
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        annotations: ${{ steps.meta.outputs.annotations }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
