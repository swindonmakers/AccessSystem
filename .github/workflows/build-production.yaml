name: 🧩 Build Production Workflow

on:
  workflow_call:
    inputs:
      push:
        description: 'Push image to registry'
        required: false
        default: false
        type: boolean
      image_name:
        description: 'Name of the image'
        required: true
        type: string

env:
  CONTAINER_REGISTRY: ghcr.io

jobs:
  build:
    name: Build Production Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v6

    - name: 🏷️ Generate Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.CONTAINER_REGISTRY }}/${{ github.repository_owner }}/${{ inputs.image_name }}
        tags: |
          type=ref,event=branch,priority=610
          type=semver,pattern={{raw}}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,format=long
          type=raw,value=latest,enable={{is_default_branch}}
        annotations: |
          runnumber=${{ github.run_id }}
          sha=${{ github.sha }}
          ref=${{ github.ref }}
          org.opencontainers.image.description="Production Container for Swindon Makerspace Access System"

    - name: 🔐 Log in to GitHub Container Registry
      if: ${{ inputs.push }}
      uses: docker/login-action@v3
      with:
        registry: ${{ env.CONTAINER_REGISTRY }}
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 🛠️ Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🚀 Build production image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        target: production
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        annotations: ${{ steps.meta.outputs.annotations }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
